spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ISSUER_URI}
      client:
        registration:
          cognito:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            scope:
              - email
              - openid
              - phone
            redirect-uri: ${REDIRECT_URI}
        provider:
          cognito:
            issuer-uri: ${ISSUER_URI}
            user-name-attribute: username
            logout-uri: ${LOGOUT_REDIRECT_URI:http://localhost:5173/search}
